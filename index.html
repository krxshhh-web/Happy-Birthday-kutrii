<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-family: 'Comic Sans MS', cursive;
  background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

h1 {
  font-size: 65px;
  color: white;
  text-align: center;
  text-shadow: 0 0 20px #fff, 0 0 40px #ff4d6d;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #fff; }
  to { text-shadow: 0 0 30px #ff4d6d; }
}

.cake {
  font-size: 120px;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  50% { transform: translateY(-20px); }
}

button {
  margin-top: 30px;
  padding: 15px 35px;
  font-size: 20px;
  border-radius: 30px;
  border: none;
  background: white;
  color: #ff4d6d;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  background: #ffe0ec;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: white;
  animation: float 6s linear infinite;
}

@keyframes float {
  from {
    transform: translateY(100vh);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="cake">🎂</div>

<h1>Happy Birthday<br>My Best Friend 💖</h1>

<button onclick="goNext()">Click for Surprise 🎁</button>

<script>
function goNext() {
  window.location.href = "surprise.html";
}

/* Create hearts */
setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random() * 30) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 300);
</script>

</body>
</html>
